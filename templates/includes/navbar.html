{% load static %}

<header class="section-header">

    <!-- ========================= TOP BAR ========================= -->
    <div class="top-bar py-2 border-bottom">
        <div class="container d-flex justify-content-between align-items-center flex-wrap">
            <div class="top-left d-flex align-items-center">
                <a href="#" class="top-link mr-3">English</a>
                <a href="#" class="top-link">INR</a>
            </div>
            <div class="top-right d-flex align-items-center">
                <a href="#" class="top-link mr-3"><i class="fa fa-envelope mr-1"></i> Email</a>
                <a href="#" class="top-link"><i class="fa fa-phone mr-1"></i> Call us</a>
            </div>
        </div>
    </div>

    <!-- ========================= MAIN HEADER ========================= -->
    <section class="header-main py-3 bg-white shadow-sm">
        <div class="container">
            <div class="row align-items-center gy-3">

                <!-- Logo -->
                <div class="col-lg-2 col-md-3 col-6">
                    <a href="{% url 'home' %}" class="brand-wrap d-flex align-items-center">
                        <img class="logo" src="{% static 'images/logo1.png' %}" alt="Tryvion Logo">
                    </a>
                </div>

                <!-- Category + Search -->
                <div class="col-lg-7 col-md-6 col-12 order-3 order-md-2 mt-3 mt-md-0">
                    <form action="{% url 'search' %}" class="search-form" method="GET">
                        <div class="search-wrapper d-flex">

                            <!-- Category Dropdown -->
                            <div class="dropdown category-dropdown">
                                <button class="btn category-btn dropdown-toggle" type="button" data-toggle="dropdown">
                                    <i class="fa fa-bars mr-2"></i> Categories
                                </button>
                                <div class="dropdown-menu">
                                    <a class="dropdown-item" href="{% url 'store' %}">All Products</a>
                                    {% for category in links %}
                                        <a class="dropdown-item" href="{{ category.get_url }}">{{ category.category_name }}</a>
                                    {% endfor %}
                                </div>
                            </div>

                            <!-- Search Input -->
                            <div class="input-group search-box">
                                <input type="text" class="form-control search-input" placeholder="Search dresses, tops, outfits..." name="keyword">
                                <div class="input-group-append">
                                    <button class="btn search-btn" type="submit">
                                        <i class="fa fa-search"></i>
                                    </button>
                                </div>
                            </div>

                        </div>
                    </form>
                </div>

                <!-- Right Side -->
                <div class="col-lg-3 col-md-3 col-6 order-2 order-md-3">
                    <div class="header-right d-flex justify-content-end align-items-center">

                        {% if user.id is None %}
                            <div class="account-box text-right mr-3 d-none d-md-block">
                                <small class="text-muted d-block">Welcome Guest</small>
                                <div>
                                    <a href="{% url 'login' %}" class="account-link">Sign In</a>
                                    <span class="mx-1 text-muted">|</span>
                                    <a href="{% url 'register' %}" class="account-link">Register</a>
                                </div>
                            </div>
                        {% else %}
                            <div class="account-box text-right mr-3 d-none d-md-block">
                                <small class="text-muted d-block">Welcome {{ user.first_name }}</small>
                                <div>
                                    <a href="{% url 'dashboard' %}" class="account-link">Dashboard</a>
                                    <span class="mx-1 text-muted">|</span>
                                    <a href="{% url 'logout' %}" class="account-link">Logout</a>
                                </div>
                            </div>
                        {% endif %}

                        <!-- Store Button -->
                        <a href="{% url 'store' %}" class="btn btn-outline-dark btn-sm mr-2 d-none d-lg-inline-block">
                            Store
                        </a>

                        <!-- Cart -->
                        <a href="{% url 'cart' %}" class="cart-icon position-relative">
                            <div class="cart-circle">
                                <i class="fa fa-shopping-cart"></i>
                            </div>
                            <span class="badge badge-danger cart-badge">{{ cart_count }}</span>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </section>

</header>

<!-- ========================= NAVBAR STYLES ========================= -->
<style>
    .top-bar {
        background: #f9fafb;
        font-size: 14px;
    }

    .top-link {
        color: #6b7280;
        font-weight: 500;
        text-decoration: none;
        transition: 0.3s ease;
    }

    .top-link:hover {
        color: #111827;
    }

    .header-main {
        border-bottom: 1px solid #f1f1f1;
    }

    .logo {
        max-height: 52px;
        width: auto;
    }

    .search-wrapper {
        background: #fff;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid #e5e7eb;
        box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }

    .category-btn {
        background: #111827;
        color: #fff;
        border: none;
        border-radius: 0;
        padding: 12px 18px;
        font-weight: 500;
        min-width: 160px;
    }

    .category-btn:hover,
    .category-btn:focus {
        background: #000;
        color: #fff;
        box-shadow: none;
    }

    .search-box {
        flex: 1;
    }

    .search-input {
        border: none;
        padding: 14px 18px;
        font-size: 15px;
        box-shadow: none !important;
    }

    .search-btn {
        background: #111827;
        color: #fff;
        border: none;
        padding: 0 22px;
        border-radius: 0;
    }

    .search-btn:hover {
        background: #000;
        color: #fff;
    }

    .account-link {
        color: #111827;
        font-weight: 500;
        text-decoration: none;
    }

    .account-link:hover {
        color: #000;
    }

    .cart-icon {
        text-decoration: none;
    }

    .cart-circle {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #f3f4f6;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #111827;
        font-size: 18px;
        transition: 0.3s ease;
        border: 1px solid #e5e7eb;
    }

    .cart-circle:hover {
        background: #111827;
        color: #fff;
    }

    .cart-badge {
        position: absolute;
        top: -4px;
        right: -6px;
        font-size: 11px;
        padding: 5px 7px;
        border-radius: 50%;
    }

    @media (max-width: 991px) {
        .search-wrapper {
            flex-direction: column;
            border-radius: 18px;
        }

        .category-btn {
            width: 100%;
            border-radius: 0;
        }

        .search-btn {
            padding: 0 18px;
        }

        .logo {
            max-height: 45px;
        }
    }

    @media (max-width: 767px) {
        .top-bar {
            display: none;
        }

        .search-wrapper {
            margin-top: 10px;
        }

        .cart-circle {
            width: 42px;
            height: 42px;
            font-size: 16px;
        }
    }
</style>
