{% load static %}

<!-- TOP BAR -->
<div class="container-fluid text-center"
     style="background: linear-gradient(to right, #3167EB, #1f2937);
            padding:10px;
            font-weight:600;
            position:sticky;
            top:0;
            z-index:999;">

    <a href="#"
       style="color:white;text-decoration:none;letter-spacing:1px;">
        🔥 Great Deals Available Now 🔥
    </a>
</div>

<!-- HEADER -->
<header class="section-header">

<section class="header-main border-bottom bg-white py-2">

<div class="container">

<div class="row align-items-center">

    <!-- LOGO -->
    <div class="col-lg-2 col-md-3 col-6">
        <a href="{% url 'home' %}">
            <img src="{% static 'images/logo2.png' %}" height="45">
        </a>
    </div>

    <!-- ALL CATEGORIES (FIXED DROPDOWN) -->
    <div class="col-lg-2 col-md-3 col-6">

        <div class="dropdown">

            <button class="btn btn-primary dropdown-toggle w-100"
                    type="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false">

                <i class="fa fa-bars"></i> All Categories

            </button>

            <div class="dropdown-menu">

                <a class="dropdown-item" href="{% url 'store' %}">
                    All Products
                </a>

                {% for category in links %}
                    <a class="dropdown-item" href="{{ category.get_url }}">
                        {{ category.category_name }}
                    </a>
                {% endfor %}

            </div>

        </div>

    </div>

    <!-- STORE BUTTON -->
    <div class="col-lg-1 col-md-2 col-6 text-center">

        <a href="{% url 'store' %}" class="btn btn-outline-primary w-100">
            Store
        </a>

    </div>

    <!-- SEARCH -->
    <div class="col-lg-4 col-md-5 mt-2 mt-md-0">

        <form action="{% url 'search' %}" method="GET">

            <div class="input-group">

                <input type="text"
                       class="form-control"
                       name="keyword"
                       placeholder="Search products..."
                       required>

                <button class="btn btn-primary">
                    <i class="fa fa-search"></i>
                </button>

            </div>

        </form>

    </div>

    <!-- USER + CART -->
    <div class="col-lg-3 col-md-12 text-end mt-2 mt-lg-0">

        <div class="d-flex justify-content-end align-items-center gap-3">

            {% if user.id is None %}

                <div class="text-end">
                    <small>Welcome guest!</small><br>
                    <a href="{% url 'login' %}">Login</a> |
                    <a href="{% url 'register' %}">Register</a>
                </div>

            {% else %}

                <div class="text-end">
                    <small>Welcome {{ user.first_name }}!</small><br>
                    <a href="{% url 'dashboard' %}">Dashboard</a> |
                    <a href="{% url 'logout' %}">Logout</a>
                </div>

            {% endif %}

            <!-- CART -->
            <a href="{% url 'cart' %}" class="position-relative ms-3">

                <div class="btn btn-outline-dark">
                    <i class="fa fa-shopping-cart"></i>
                </div>

                <span class="badge bg-danger position-absolute top-0 start-100 translate-middle">
                    {{ cart_count }}
                </span>

            </a>

        </div>

    </div>

</div>

</div>

</section>

</header>
